name: Auth PR Checks

on:
  pull_request:
    paths:
      - "app/**"
      - "lib/**"
      - "docs/**"
      - "e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"

jobs:
  auth-fast-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit and route tests
        run: npm test

      - name: Playwright wiring check
        run: npm run test:e2e -- --list
