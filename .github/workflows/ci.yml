name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Benchmark reconcile
        run: npm run quality:reconcile

      # Strict when secrets exist (canonical repo). Fork PRs typically have no secrets — step skipped.
      - name: Economic quality gate (strict live metrics)
        if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && (secrets.SUPABASE_URL != '' || secrets.NEXT_PUBLIC_SUPABASE_URL != '') }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QUALITY_GATE_STRICT: "1"
        run: npm run quality:gate

      - name: Economic quality gate skipped
        if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY == '' || (secrets.SUPABASE_URL == '' && secrets.NEXT_PUBLIC_SUPABASE_URL == '') }}
        run: |
          echo "::notice title=Economic quality gate::Skipped — no Supabase URL + service role in repository secrets (expected for forks). Configure SUPABASE_SERVICE_ROLE_KEY and SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL on the canonical repo for strict 14d metric checks on every merge."
