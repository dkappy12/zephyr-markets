name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Benchmark reconcile
        run: npm run quality:reconcile

      # Do not use `secrets` in step `if:` — it can prevent the workflow from running any jobs.
      # Fork PRs have no secrets (empty env); canonical repo passes URL + service role for strict gate.
      - name: Economic quality gate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || { [ -z "$SUPABASE_URL" ] && [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; }; then
            echo "::notice title=Economic quality gate::Skipped — no Supabase URL + service role in repository secrets (expected for forks). Configure SUPABASE_SERVICE_ROLE_KEY and SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL on the canonical repo for strict 14d metric checks on every merge."
            exit 0
          fi
          # Non-strict: log live metrics and warn on threshold breach without failing the merge (see model-quality-gate.mjs).
          # Use QUALITY_GATE_STRICT=1 locally or in trust-report for release gating.
          export QUALITY_GATE_STRICT=0
          npm run quality:gate

      # Regression guard against feed/backfill bugs that land silently-wrong
      # rows in gas_prices or carbon_prices. Mirrors the ingestion-agent
      # write-time sanity ranges (python-agents/ingestion-agent/main.py) so
      # that any ad-hoc script bypassing ingestion still gets caught here.
      # Non-strict on merges so a legacy bad row cannot wedge the queue;
      # release/trust-report jobs should run with DATA_HEALTH_STRICT=1.
      - name: Data-health check (gas_prices, carbon_prices)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATA_HEALTH_STRICT: "0"
        run: npm run data:health
